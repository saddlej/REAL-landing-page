<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed — REAL™</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #0F2044; --navy-mid: #122459; --gold: #FFD007; --white: #ffffff; }
    body { background: var(--navy); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: var(--navy-mid); border: 1px solid rgba(255,208,7,0.15); border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .logo { font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.15em; color: var(--white); margin-bottom: 32px; display: block; text-decoration: none; }
    .logo span { color: var(--gold); font-size: 13px; vertical-align: super; }
    .icon { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 28px; }
    .icon.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
    .icon.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
    .icon.warning { background: rgba(255,208,7,0.15); border: 1px solid rgba(255,208,7,0.3); }
    .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; color: var(--white); margin-bottom: 16px; line-height: 1.2; }
    p { font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.65); margin-bottom: 32px; }
    .btn { display: inline-block; background: var(--gold); color: var(--navy); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; text-decoration: none; padding: 14px 32px; border-radius: 8px; }
  </style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <svg viewBox="200 200 1100 1100" xmlns="http://www.w3.org/2000/svg" width="56" height="56" style="display:block; margin: 0 auto 12px;">
      <path fill="#ffffff" d="M 757 269 C 787 288 979 406 1148 406 L 1148 789 C 1148 789 1153 1132 755 1235 C 750 1237 745 1235 745 1235 C 347 1132 352 789 352 789 L 352 406 C 536 406 743 269 743 269 C 743 269 749 263 757 269 Z"/>
      <path fill="#FFD007" d="M 693 1040 L 567 915 L 617 864 L 693 940 L 883 750 L 933 800 Z"/>
      <g fill="#0F2044">
        <path transform="translate(390,720)" d="M 15.5 -213 L 91.7 -213 C 112.2 -213 128.9 -207.6 141.8 -196.7 C 154.7 -185.7 161.1 -170.1 161.1 -149.8 C 161.1 -134.1 157.2 -121 149.4 -110.4 C 141.6 -99.8 130.9 -92.4 117.5 -88.1 L 190.8 0 L 129.1 0 L 64 -84.2 L 64 0 L 15.5 0 Z M 64 -118.5 L 69.7 -118.5 C 74.2 -118.5 78 -118.6 81.1 -118.8 C 84.2 -119 87.7 -119.6 91.7 -120.6 C 95.6 -121.6 98.8 -123.1 101.2 -125 C 103.6 -126.9 105.7 -129.6 107.4 -133.3 C 109.1 -136.9 110 -141.3 110 -146.4 C 110 -151.6 109.1 -156 107.4 -159.6 C 105.7 -163.2 103.6 -166 101.2 -167.9 C 98.8 -169.8 95.6 -171.2 91.7 -172.3 C 87.7 -173.3 84.2 -173.9 81.1 -174 C 78 -174.2 74.2 -174.3 69.7 -174.3 L 64 -174.3 Z"/>
        <path transform="translate(587,720)" d="M 137.4 -213 L 137.4 -170.4 L 64 -170.4 L 64 -128.1 L 134.3 -128.1 L 134.3 -85.5 L 64 -85.5 L 64 -42.6 L 137.4 -42.6 L 137.4 0 L 15.5 0 L 15.5 -213 Z"/>
        <path transform="translate(750,720)" d="M 123.7 -213 L 209.7 0 L 157.5 0 L 141.8 -42.6 L 60.7 -42.6 L 45 0 L -7.2 0 L 78.8 -213 Z M 125.3 -85.2 L 101.5 -147.2 L 101 -147.2 L 77.2 -85.2 Z"/>
        <path transform="translate(963,720)" d="M 64 -213 L 64 -42.6 L 137.4 -42.6 L 137.4 0 L 15.5 0 L 15.5 -213 Z"/>
      </g>
    </svg>
    REAL<span>™</span>
  </a>
  <div id="content"></div>
</div>
<script>
  const status = new URLSearchParams(window.location.search).get('status') || 'invalid';
  const states = {
    success: { icon: '✓', iconClass: 'success', label: 'Verification Complete', title: 'Email confirmed', message: 'Your email address has been verified and added to your REAL profile.', btn: 'Go to dashboard →', href: '/dashboard.html' },
    already: { icon: '✓', iconClass: 'success', label: 'Already Verified', title: 'Already confirmed', message: 'This email address has already been verified on your REAL profile.', btn: 'Go to dashboard →', href: '/dashboard.html' },
    expired: { icon: '⏱', iconClass: 'warning', label: 'Link Expired', title: 'This link has expired', message: 'Confirmation links are valid for 24 hours. Head back to your dashboard and request a new one.', btn: 'Go to dashboard →', href: '/dashboard.html' },
    error: { icon: '!', iconClass: 'error', label: 'Something went wrong', title: 'Verification failed', message: 'Something went wrong. Please try again from your dashboard or contact info@realverified.co.uk.', btn: 'Go to dashboard →', href: '/dashboard.html' },
    invalid: { icon: '!', iconClass: 'error', label: 'Invalid Link', title: 'This link is not valid', message: 'This confirmation link is invalid or has already been used.', btn: 'Go to dashboard →', href: '/dashboard.html' }
  };
  const s = states[status] || states.invalid;
  document.getElementById('content').innerHTML = `<div class="icon ${s.iconClass}">${s.icon}</div><div class="label">${s.label}</div><h1>${s.title}</h1><p>${s.message}</p><a href="${s.href}" class="btn">${s.btn}</a>`;
</script>
</body>
</html>
