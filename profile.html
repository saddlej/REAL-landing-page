<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REAL Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0F2044;
      --gold: #FFD007;
      --white: #FFFFFF;
    }

    body {
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    /* NAV */
    nav {
      background: var(--navy);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo { width: 28px; height: 28px; }

    .nav-brand-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .nav-search {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-search input {
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 14px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      width: 220px;
      outline: none;
    }

    .nav-search input::placeholder { color: rgba(255,255,255,0.35); }
    .nav-search input:focus { border-color: rgba(255,208,7,0.4); }

    .nav-search button {
      background: var(--gold);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    /* PAGE */
    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    /* TAGLINE */
    .page-tagline {
      text-align: center;
      font-size: 11px;
      color: rgba(255,208,7,0.45);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* WHITE CARD */
    .profile-card {
      background: var(--white);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }

    .badges {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .badge {
      font-size: 11px;
      padding: 4px 11px;
      border-radius: 20px;
      font-weight: 500;
    }

    .badge-id { background: #FFF8D6; color: #9A7800; border: 0.5px solid #FFD007; }
    .badge-founding { background: #FFF8DC; color: #B8860B; border: 0.5px solid #FFD007; }
    .badge-standard { background: #F3F4F6; color: #374151; border: 0.5px solid #D1D5DB; }
    .divider {
      border: none;
      border-top: 0.5px solid #e5e7eb;
      margin: 20px 0;
    }

    .section-label {
      font-size: 10px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 14px;
    }

    /* PLATFORMS */
    .platform-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      background: rgba(10, 25, 60, 0.04);
      border-left: 3px solid #FFD007;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .plat-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .plat-icon svg {
      display: block;
    }

    .platform-name {
      font-size: 12px;
      color: #9ca3af;
      width: 68px;
      flex-shrink: 0;
    }

    .platform-handle {
      font-size: 13px;
      color: var(--navy);
      font-weight: 500;
      flex: 1;
    }

    .platform-date {
      font-size: 11px;
      color: #d1d5db;
      flex-shrink: 0;
    }

    .platform-tick {
      color: #FFD007;
      font-size: 16px;
      flex-shrink: 0;
      font-weight: 700;
    }

    /* IMPERSONATION */
    .impersonation-box {
      margin-top: 4px;
      padding: 11px 14px;
      background: #fafafa;
      border-radius: 8px;
      border: 0.5px solid #f3f4f6;
      font-size: 12px;
      color: #9ca3af;
    }

    /* PROFILE CARD TWO-COLUMN HEADER */
    .profile-card-header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
    }

    .profile-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    /* PROFILE AVATAR */
    .profile-avatar { width: 90px; height: 90px; border-radius: 50%; background: var(--navy); border: 2.5px solid rgba(255,208,7,0.55); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 50%; }
    .profile-avatar-shield { width: 44px; height: 44px; }

    .real-id {
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      color: var(--gold);
      font-weight: 400;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .display-name {
      font-size: 22px;
      color: var(--navy);
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .verified-since {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 14px;
    }

    /* NOT FOUND */
    .not-found {
      text-align: center;
      padding: 60px 20px;
    }

    .not-found .nf-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .not-found h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      color: rgba(255,255,255,0.7);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .not-found p {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
    }

    /* FOOTER */
    .not-you {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 20px;
    }

    .not-you a {
      color: var(--gold);
      text-decoration: none;
      opacity: 0.8;
    }

    .not-you a:hover { opacity: 1; }

    .page-footer {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      margin-top: 14px;
      letter-spacing: 0.05em;
    }

    /* SEARCH RESULTS */
    .search-results {
      margin-top: 12px;
    }

    .search-result-item {
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      display: block;
    }

    .search-result-item:hover { background: rgba(255,255,255,0.09); }

    .sri-id {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--gold);
      margin-bottom: 3px;
    }

    .sri-name {
      font-size: 15px;
      color: white;
      font-weight: 500;
    }

    .sri-since {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    .search-none {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      padding: 20px;
    }

    /* PROFILE META — bio / location / contact */
    .profile-bio {
      font-size: 14px;
      color: #374151;
      line-height: 1.65;
      margin-bottom: 10px;
    }
    .profile-location {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 10px;
    }
    .profile-contact-link {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    /* NAVY THEME */
    .profile-card--navy { background: var(--navy); }
    .profile-card--navy .display-name { color: white; }
    .profile-card--navy .verified-since { color: rgba(255,255,255,0.45); }
    .profile-card--navy .section-label { color: rgba(255,255,255,0.38); }
    .profile-card--navy .divider { border-color: rgba(255,255,255,0.1); }
    .profile-card--navy .platform-row { background: rgba(255,255,255,0.05); }
    .profile-card--navy .platform-name { color: rgba(255,255,255,0.45); }
    .profile-card--navy .platform-handle { color: white; }
    .profile-card--navy .platform-date { color: rgba(255,255,255,0.3); }
    .profile-card--navy .profile-bio { color: rgba(255,255,255,0.8); }
    .profile-card--navy .profile-location { color: rgba(255,255,255,0.5); }
    .profile-card--navy .profile-contact-link { color: rgba(255,255,255,0.5); }
    .profile-card--navy .impersonation-box { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); color: rgba(255,255,255,0.45); }
    .profile-card--navy .badge-id { background: rgba(255,208,7,0.15); color: var(--gold); border-color: rgba(255,208,7,0.3); }
    .profile-card--navy .badge-founding { background: rgba(255,208,7,0.12); color: rgba(255,208,7,0.9); border-color: rgba(255,208,7,0.25); }
    .profile-card--navy .badge-standard { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.15); }

    /* TRUST TIMELINE */
    .trust-timeline {
      margin-left: 6px;
    }
    .timeline-event {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 7px 0 7px 14px;
      border-left: 1.5px solid rgba(255,208,7,0.25);
      position: relative;
    }
    .timeline-event::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 12px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,208,7,0.65);
    }
    .timeline-desc {
      font-size: 12px;
      color: #4b5563;
      flex: 1;
      line-height: 1.4;
    }
    .timeline-date {
      font-size: 11px;
      color: #9ca3af;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .profile-card--navy .timeline-event { border-left-color: rgba(255,208,7,0.2); }
    .profile-card--navy .timeline-event::before { background: rgba(255,208,7,0.55); }
    .profile-card--navy .timeline-desc { color: rgba(255,255,255,0.65); }
    .profile-card--navy .timeline-date { color: rgba(255,255,255,0.35); }

    /* PLATFORM TYPE & COMPROMISE */
    .plat-type {
      font-size: 9px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .plat-type-primary { background: rgba(10,25,60,0.05); color: #9ca3af; }
    .plat-type-backup  { background: rgba(255,208,7,0.12); color: #9a7c00; }
    .platform-row--compromised {
      border-left-color: #c0392b;
      background: rgba(192,57,43,0.04);
      flex-wrap: wrap;
    }
    .plat-compromise-warning {
      width: 100%;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(192,57,43,0.12);
      font-size: 11px;
      color: #c0392b;
      font-weight: 500;
      line-height: 1.4;
    }
    .plat-recovered {
      color: #22a366;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .profile-card--navy .plat-type-primary { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35); }
    .profile-card--navy .plat-type-backup  { background: rgba(255,208,7,0.1);  color: rgba(255,208,7,0.75); }
    .profile-card--navy .platform-row--compromised { background: rgba(192,57,43,0.08); }
    .profile-card--navy .plat-compromise-warning   { color: #e57373; border-top-color: rgba(192,57,43,0.2); }

  /* TWO-COLUMN LOWER SECTION */
  .profile-lower {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
  }
  .profile-lower-col {
    min-width: 0;
    max-height: 600px;
    overflow-y: auto;
  }

  @media (max-width: 720px) {
    .profile-lower { grid-template-columns: 1fr; gap: 0; }
    .profile-lower-col { max-height: none; overflow-y: visible; }
  }

  @media (max-width: 600px) {
    nav { flex-wrap: wrap; gap: 10px; padding: 14px 16px; }
    .nav-brand { order: 1; }
    .nav-search { width: 100%; order: 2; }
    .nav-search input { width: 100%; flex: 1; }
    .profile-card { padding: 24px 18px; }
    .real-id { font-size: 24px; }
    .badges { flex-direction: row; flex-wrap: wrap; }
    .platform-row { flex-wrap: wrap; align-items: flex-start; }
    .platform-handle { flex: 1; }
    .platform-date { width: calc(100% - 42px); margin-left: 42px; margin-top: 2px; font-size: 11px; color: #9ca3af; order: 4; }
    .platform-tick { margin-left: auto; order: 3; align-self: flex-start; padding-top: 2px; }
  }
  </style>
</head>

      'Email': `<div class="plat-icon" style="background:#4B5563"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2" stroke="white" stroke-width="2"/><path d="M2 8l10 7 10-7" stroke="white" stroke-width="2" stroke-linecap="round"/></svg></div>`,
      'Website': `<div class="plat-icon" style="background:#0A193C"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="2"/><path d="M2 12h20M12 2c-3 3-4 6-4 10s1 7 4 10M12 2c3 3 4 6 4 10s-1 7-4 10" stroke="white" stroke-width="1.5"/></svg></div>`
    };
    return icons[platform] || `<div class="plat-icon" style="background:#4B5563"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="8"/></svg></div>`;
  }

  function formatDate(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function formatDateFull(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function getProfileInitials(name) {
    const n = (name || '').trim();
    const parts = n.split(/\s+/);
    if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    return n.slice(0, 2).toUpperCase() || '?';
  }

  function renderProfile(member, platforms) {
    const tierBadge = member.membership_tier === 'founding'
      ? '<span class="badge badge-founding">Founding Member</span>'
      : '<span class="badge badge-standard">Standard Member</span>';

    let platformsHTML = '';
    if (platforms && platforms.length > 0) {
      platforms.forEach(p => {
        const isBackup      = p.is_backup === true;
        const cs            = p.compromise_status || null;
        const activeCompromise = ['hacked', 'banned', 'disputed'].includes(cs);

        const typeLabel = isBackup
          ? `<span class="plat-type plat-type-backup">Backup</span>`
          : `<span class="plat-type plat-type-primary">Primary</span>`;

        const rightArea = activeCompromise
          ? ''
          : `<span class="platform-date">${formatDate(p.verified_at)}</span><span class="platform-tick">✓</span>`;

        const compromiseWarning = activeCompromise
          ? `<span class="plat-compromise-warning">⚠ This account may not be in my control right now. Do not interact with it or send money. Check back here for updates.</span>`
          : '';

        const rowClass = `platform-row${activeCompromise ? ' platform-row--compromised' : ''}`;

        platformsHTML += `
          <div class="${rowClass}">
            ${getPlatformIcon(p.platform)}
            <span class="platform-name">${escapeHtml(p.platform)}</span>
            ${typeLabel}
            <span class="platform-handle">${escapeHtml(p.handle)}</span>
            ${rightArea}
            ${compromiseWarning}
          </div>`;
      });
    } else {
      platformsHTML = '<p style="font-size:13px;color:#9ca3af;">No platforms verified yet.</p>';
    }

    const impersonationLine = member.impersonation_count > 0
      ? `<div class="impersonation-box">${member.impersonation_count} impersonation attempt${member.impersonation_count === 1 ? '' : 's'} documented by REAL</div>`
      : '';

    const avatarUrl = member.avatar_url || `${SUPABASE_URL}/storage/v1/object/public/avatars/${member.user_id}`;
    const initials = getProfileInitials(member.display_name || 'REAL Member');
    const themeClass = member.profile_theme === 'navy' ? 'profile-card--navy' : '';

    // ─── Bio / Location / Contact ───
    const bio = (member.bio || '').trim();
    const location = (member.location || '').trim();
    const contactLink = (member.contact_link || '').trim();
    let profileMetaHTML = '';
    if (bio || location || contactLink) {
      profileMetaHTML += '<div style="margin-bottom:4px;">';
      if (bio) profileMetaHTML += `<p class="profile-bio">${escapeHtml(bio)}</p>`;
      if (location) profileMetaHTML += `<p class="profile-location">📍 ${escapeHtml(location)}</p>`;
      if (contactLink) profileMetaHTML += `<p class="profile-contact-link">💬 ${escapeHtml(contactLink)}</p>`;
      profileMetaHTML += '</div>';
    }

    // Build trust timeline events
    const tlEvents = [];
    if (member.verified_since) {
      const joinTs = new Date(member.verified_since).getTime();
      tlEvents.push({ ts: joinTs, desc: 'Member since' });
      tlEvents.push({ ts: joinTs, desc: member.membership_tier === 'founding' ? 'Founding Member status granted' : 'Standard membership assigned' });
      if (member.id_verified) tlEvents.push({ ts: joinTs, desc: 'Government ID confirmed' });
    }
    if (platforms) {
      platforms.forEach(p => {
        if (p.verified_at) tlEvents.push({ ts: new Date(p.verified_at).getTime(), desc: `${p.platform} verified — ${p.handle}` });
        const cs = p.compromise_status || null;
        if (cs && p.updated_at) {
          const csTs = new Date(p.updated_at).getTime();
          if (['hacked', 'banned', 'disputed'].includes(cs)) {
            tlEvents.push({ ts: csTs, desc: `${p.platform} reported as ${cs} — last verified owner: ${p.handle}` });
          } else if (cs === 'recovered') {
            tlEvents.push({ ts: csTs, desc: `${p.platform} account recovered` });
          }
        }
      });
    }
    tlEvents.sort((a, b) => a.ts - b.ts);

    document.getElementById('content').innerHTML = `
      <div class="profile-card ${themeClass}">
        <div class="profile-card-header">
          <div class="profile-avatar">
            <img src="${escapeHtml(avatarUrl)}" alt="Profile picture"
                 onload="this.style.display='block';this.nextElementSibling.style.display='none';"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
            <span style="font-family:'DM Mono',monospace;font-size:22px;color:var(--gold);line-height:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%;">${escapeHtml(initials)}</span>
          </div>
          <div class="profile-info">
            <div class="real-id">${member.real_id}</div>
            <div class="display-name">${member.display_name || 'REAL Member'}</div>
            <div class="verified-since">Verified since ${formatDateFull(member.verified_since)}</div>
            <div class="badges">
              ${member.id_verified ? '<span class="badge badge-id">✓ Gov ID Confirmed</span>' : ''}
              ${tierBadge}
            </div>
          </div>
        </div>
        ${profileMetaHTML ? `<hr class="divider">${profileMetaHTML}` : ''}
        <hr class="divider">
        <div class="profile-lower">
          <div class="profile-lower-col">
            <div class="section-label">Verified Platforms</div>
            ${platformsHTML}
          </div>
          <div class="profile-lower-col">
            ${tlEvents.length > 0 ? `
            <div class="section-label">Trust Timeline</div>
            <div class="trust-timeline">
              ${tlEvents.map(e => `<div class="timeline-event"><span class="timeline-desc">${escapeHtml(e.desc)}</span><span class="timeline-date">${formatDate(e.ts)}</span></div>`).join('')}
            </div>` : ''}
          </div>
        </div>
        <hr class="divider">
        ${impersonationLine}
      </div>`;
  }

  function renderNotFound(realId) {
    document.getElementById('content').innerHTML = `
      <div class="not-found">
        <div class="nf-icon">🔍</div>
        <h2>No profile found</h2>
        <p>No verified profile exists for <strong style="color:rgba(255,255,255,0.6);">${realId}</strong>.<br>If you're looking to verify someone's identity, ask them for their REAL profile link directly.</p>
      </div>`;
  }

  async function loadProfile() {
    const path = window.location.pathname;
    const segments = path.split('/').filter(Boolean);
    // Support both /RL-000001 and /profile/RL-000001
    const rawId = segments.find(s => s.toUpperCase().startsWith('RL-')) || segments[segments.length - 1];

    if (!rawId || !rawId.toUpperCase().startsWith('RL-')) {
      document.getElementById('content').innerHTML = `
        <div class="not-found">
          <div class="nf-icon">🔍</div>
          <h2>No profile found</h2>
          <p>Search by REAL ID number or name above to find a verified profile.</p>
        </div>`;
      return;
    }

    const realId = rawId.toUpperCase();
    document.title = `${realId} · REAL`;

    const { data: member, error } = await supabaseClient
      .from('members')
      .select('*')
      .eq('real_id', realId)
      .single();

    if (error || !member) {
      renderNotFound(realId);
      return;
    }

    const { data: platforms } = await supabaseClient
      .from('platform_verifications')
      .select('platform, handle, verified_at, is_backup, compromise_status, updated_at')
      .eq('user_id', member.user_id)
      .eq('status', 'verified')
      .order('verified_at', { ascending: true });

    renderProfile(member, platforms);
  }

  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    const resultsDiv = document.getElementById('searchResults');
    resultsDiv.style.display = 'block';
    resultsDiv.innerHTML = '<div class="search-none">Searching...</div>';

    let results = [];

    if (query.toUpperCase().startsWith('RL-')) {
      const { data } = await supabaseClient
        .from('members')
        .select('real_id, display_name, verified_since, membership_tier')
        .eq('real_id', query.toUpperCase())
        .eq('is_active', true);
      results = data || [];
    } else {
      const { data } = await supabaseClient
        .from('members')
        .select('real_id, display_name, verified_since, membership_tier')
        .ilike('display_name', `%${query}%`)
        .eq('is_active', true)
        .limit(10);
      results = data || [];
    }

    if (results.length === 0) {
      resultsDiv.innerHTML = '<div class="search-none">No verified profiles found for that search.</div>';
      return;
    }

    resultsDiv.innerHTML = results.map(r => `
      <a href="/profile/${r.real_id}" class="search-result-item">
        <div class="sri-id">${r.real_id}</div>
        <div class="sri-name">${r.display_name || 'REAL Member'}</div>
        <div class="sri-since">Verified since ${formatDate(r.verified_since)}</div>
      </a>`).join('');
  }

  function focusSearch() {
    document.getElementById('searchInput').focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  loadProfile();
</script>
</body>
</html>
