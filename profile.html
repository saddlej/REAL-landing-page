<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REAL Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0F2044;
      --gold: #FFD007;
      --white: #FFFFFF;
    }

    body {
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    /* NAV */
    nav {
      background: var(--navy);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo { width: 28px; height: 28px; }

    .nav-brand-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .nav-search {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-search input {
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 14px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      width: 220px;
      outline: none;
    }

    .nav-search input::placeholder { color: rgba(255,255,255,0.35); }
    .nav-search input:focus { border-color: rgba(255,208,7,0.4); }

    .nav-search button {
      background: var(--gold);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    /* PAGE */
    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    /* TAGLINE */
    .page-tagline {
      text-align: center;
      font-size: 11px;
      color: rgba(255,208,7,0.45);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    /* WHITE CARD */
    .profile-card {
      background: var(--white);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }

    .real-id {
      font-family: 'DM Mono', monospace;
      font-size: 32px;
      color: var(--navy);
      font-weight: 400;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .real-id .id-number { color: var(--gold); }

    .display-name {
      font-size: 24px;
      color: var(--navy);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .verified-since {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 22px;
    }

    .badges {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .badge {
      font-size: 11px;
      padding: 4px 11px;
      border-radius: 20px;
      font-weight: 500;
    }

    .badge-id { background: #FFF8D6; color: #9A7800; border: 0.5px solid #FFD007; }
    .badge-founding { background: #EEF2FF; color: #3730A3; border: 0.5px solid #C7D2FE; }
    .badge-standard { background: #F3F4F6; color: #374151; border: 0.5px solid #D1D5DB; }
    .badge-score { background: rgba(255,208,7,0.12); color: #FFD007; border: 0.5px solid rgba(255,208,7,0.4); }

    .divider {
      border: none;
      border-top: 0.5px solid #e5e7eb;
      margin: 20px 0;
    }

    .section-label {
      font-size: 10px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 14px;
    }

    /* PLATFORMS */
    .platform-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .platform-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .platform-icon img {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }

    .platform-icon-text {
      font-size: 13px;
      color: #6b7280;
      font-weight: 500;
    }

    .platform-name {
      font-size: 12px;
      color: #9ca3af;
      width: 72px;
      flex-shrink: 0;
    }

    .platform-handle {
      font-size: 13px;
      color: var(--navy);
      font-weight: 500;
      flex: 1;
    }

    .platform-date {
      font-size: 11px;
      color: #d1d5db;
      flex-shrink: 0;
    }

    .platform-tick {
      color: #16a34a;
      font-size: 16px;
      flex-shrink: 0;
    }

    /* IMPERSONATION */
    .impersonation-box {
      margin-top: 4px;
      padding: 11px 14px;
      background: #fafafa;
      border-radius: 8px;
      border: 0.5px solid #f3f4f6;
      font-size: 12px;
      color: #9ca3af;
    }

    /* PROFILE AVATAR */
    .profile-avatar { width: 88px; height: 88px; border-radius: 50%; background: var(--navy); border: 3px solid rgba(255,208,7,0.3); display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 20px; flex-shrink: 0; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 50%; }
    .profile-avatar-initials { font-family: 'DM Mono', monospace; font-size: 28px; color: var(--gold); user-select: none; line-height: 1; }

    /* NOT FOUND */
    .not-found {
      text-align: center;
      padding: 60px 20px;
    }

    .not-found .nf-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .not-found h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      color: rgba(255,255,255,0.7);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .not-found p {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
    }

    /* FOOTER */
    .not-you {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 20px;
    }

    .not-you a {
      color: var(--gold);
      text-decoration: none;
      opacity: 0.8;
    }

    .not-you a:hover { opacity: 1; }

    .page-footer {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      margin-top: 14px;
      letter-spacing: 0.05em;
    }

    /* SEARCH RESULTS */
    .search-results {
      margin-top: 12px;
    }

    .search-result-item {
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      display: block;
    }

    .search-result-item:hover { background: rgba(255,255,255,0.09); }

    .sri-id {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--gold);
      margin-bottom: 3px;
    }

    .sri-name {
      font-size: 15px;
      color: white;
      font-weight: 500;
    }

    .sri-since {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    .search-none {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      padding: 20px;
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">
    <svg viewBox="200 200 1100 1100" xmlns="http://www.w3.org/2000/svg">
      <path fill="#ffffff" d="M 757 269 C 787 288 979 406 1148 406 L 1148 789 C 1148 789 1153 1132 755 1235 C 750 1237 745 1235 745 1235 C 347 1132 352 789 352 789 L 352 406 C 536 406 743 269 743 269 C 743 269 749 263 757 269 Z"/>
      <path fill="#FFD007" d="M 693 1040 L 567 915 L 617 864 L 693 940 L 883 750 L 933 800 Z"/>
      <g fill="#0F2044">
        <path transform="translate(390,720)" d="M 15.5 -213 L 91.7 -213 C 112.2 -213 128.9 -207.6 141.8 -196.7 C 154.7 -185.7 161.1 -170.1 161.1 -149.8 C 161.1 -134.1 157.2 -121 149.4 -110.4 C 141.6 -99.8 130.9 -92.4 117.5 -88.1 L 190.8 0 L 129.1 0 L 64 -84.2 L 64 0 L 15.5 0 Z M 64 -118.5 L 69.7 -118.5 C 74.2 -118.5 78 -118.6 81.1 -118.8 C 84.2 -119 87.7 -119.6 91.7 -120.6 C 95.6 -121.6 98.8 -123.1 101.2 -125 C 103.6 -126.9 105.7 -129.6 107.4 -133.3 C 109.1 -136.9 110 -141.3 110 -146.4 C 110 -151.6 109.1 -156 107.4 -159.6 C 105.7 -163.2 103.6 -166 101.2 -167.9 C 98.8 -169.8 95.6 -171.2 91.7 -172.3 C 87.7 -173.3 84.2 -173.9 81.1 -174 C 78 -174.2 74.2 -174.3 69.7 -174.3 L 64 -174.3 Z"/>
        <path transform="translate(587,720)" d="M 137.4 -213 L 137.4 -170.4 L 64 -170.4 L 64 -128.1 L 134.3 -128.1 L 134.3 -85.5 L 64 -85.5 L 64 -42.6 L 137.4 -42.6 L 137.4 0 L 15.5 0 L 15.5 -213 Z"/>
        <path transform="translate(750,720)" d="M 123.7 -213 L 209.7 0 L 157.5 0 L 141.8 -42.6 L 60.7 -42.6 L 45 0 L -7.2 0 L 78.8 -213 Z M 125.3 -85.2 L 101.5 -147.2 L 101 -147.2 L 77.2 -85.2 Z"/>
        <path transform="translate(963,720)" d="M 64 -213 L 64 -42.6 L 137.4 -42.6 L 137.4 0 L 15.5 0 L 15.5 -213 Z"/>
      </g>
    </svg>
    <span class="nav-brand-text">REAL™</span>
  </a>
  <div class="nav-search">
    <input type="text" id="searchInput" placeholder="Search by REAL ID or name..." />
    <button onclick="doSearch()">Search</button>
  </div>
</nav>

<div class="page">
  <p class="page-tagline">Identity Infrastructure for the Internet</p>
  <div id="content"><div class="loading">Loading profile...</div></div>
  <div id="searchResults" class="search-results" style="display:none;"></div>
  <p class="not-you">Not who you were looking for? <a href="#" onclick="focusSearch()">Search REAL</a></p>
  <p class="page-footer">realverified.co.uk · Independent Identity Verification</p>
</div>

<script>
  const SUPABASE_URL = 'https://esqmwktnnjuztyhityeo.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzcW13a3Rubmp1enR5aGl0eWVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTAxNzgsImV4cCI6MjA5MjkyNjE3OH0.4ZaYlwojE9jbRO1O3wxfWgQgUK4q5FsCzeMonGlcbuY';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const PLATFORM_ICONS = {
    'Instagram': '📷',
    'TikTok': '♪',
    'X': '𝕏',
    'Facebook': 'f',
    'LinkedIn': 'in',
    'YouTube': '▶',
    'Email': '✉',
    'Website': '🌐'
  };

  function formatDate(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function formatDateFull(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) + ' · ' + d.toISOString().slice(11,16) + ' UTC';
  }

  function calculateRealScore(idVerified, verifiedPlatformsCount, isFoundingMember, verifiedSince) {
    let score = 0;
    if (idVerified) score += 40;
    score += Math.min(verifiedPlatformsCount * 8, 30);
    if (isFoundingMember) score += 10;
    if (verifiedSince) {
      const days = (Date.now() - new Date(verifiedSince)) / 86400000;
      if (days > 180) score += 20;
      else if (days > 90) score += 10;
      else if (days > 30) score += 5;
    }
    return Math.min(score, 100);
  }

  function getScoreLabel(score) {
    if (score >= 70) return 'Verified Authority';
    if (score >= 40) return 'Verified Established';
    return 'Verified Foundation';
  }

  function getProfileInitials(name) {
    const n = (name || '').trim();
    const parts = n.split(/\s+/);
    if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    return n.slice(0, 2).toUpperCase() || '?';
  }

  function renderProfile(member, platforms) {
    const tierBadge = member.membership_tier === 'founding'
      ? '<span class="badge badge-founding">Founding Member</span>'
      : '<span class="badge badge-standard">Standard Member</span>';

    const verifiedPlatformsCount = (platforms || []).length;
    const score = calculateRealScore(member.id_verified === true, verifiedPlatformsCount, member.membership_tier === 'founding', member.verified_since);
    const scoreLabel = getScoreLabel(score);

    let platformsHTML = '';
    if (platforms && platforms.length > 0) {
      platforms.forEach(p => {
        const icon = PLATFORM_ICONS[p.platform] || '●';
        platformsHTML += `
          <div class="platform-row">
            <div class="platform-icon"><span class="platform-icon-text">${icon}</span></div>
            <span class="platform-name">${p.platform}</span>
            <span class="platform-handle">${p.handle}</span>
            <span class="platform-date">${formatDate(p.verified_at)}</span>
            <span class="platform-tick">✓</span>
          </div>`;
      });
    } else {
      platformsHTML = '<p style="font-size:13px;color:#9ca3af;">No platforms verified yet.</p>';
    }

    const impersonationLine = member.impersonation_count > 0
      ? `<div class="impersonation-box">${member.impersonation_count} impersonation attempt${member.impersonation_count === 1 ? '' : 's'} documented by REAL</div>`
      : '';

    const avatarUrl = `${SUPABASE_URL}/storage/v1/object/public/avatars/${member.user_id}`;
    const initials = getProfileInitials(member.display_name || 'REAL Member');

    document.getElementById('content').innerHTML = `
      <div class="profile-card">
        <div class="profile-avatar">
          <img src="${avatarUrl}" alt="Profile picture"
               onload="this.style.display='block';this.nextElementSibling.style.display='none';"
               onerror="this.style.display='none';">
          <span class="profile-avatar-initials">${initials}</span>
        </div>
        <div class="real-id">RL-<span class="id-number">${member.real_id.replace('RL-','')}</span></div>
        <div class="display-name">${member.display_name || 'REAL Member'}</div>
        <div class="verified-since">Verified since ${formatDateFull(member.verified_since)}</div>
        <div class="badges">
          ${member.id_verified ? '<span class="badge badge-id">✓ Gov ID Confirmed</span>' : ''}
          ${tierBadge}
          <span class="badge badge-score">${scoreLabel}</span>
        </div>
        <hr class="divider">
        <div class="section-label">Verified Platforms</div>
        ${platformsHTML}
        <hr class="divider">
        ${impersonationLine}
      </div>`;
  }

  function renderNotFound(realId) {
    document.getElementById('content').innerHTML = `
      <div class="not-found">
        <div class="nf-icon">🔍</div>
        <h2>No profile found</h2>
        <p>No verified profile exists for <strong style="color:rgba(255,255,255,0.6);">${realId}</strong>.<br>If you're looking to verify someone's identity, ask them for their REAL profile link directly.</p>
      </div>`;
  }

  async function loadProfile() {
    const path = window.location.pathname;
    const segments = path.split('/').filter(Boolean);
    const rawId = segments[segments.length - 1];

    if (!rawId || !rawId.toUpperCase().startsWith('RL-')) {
      document.getElementById('content').innerHTML = `
        <div class="not-found">
          <div class="nf-icon">🔍</div>
          <h2>No profile found</h2>
          <p>Search by REAL ID number or name above to find a verified profile.</p>
        </div>`;
      return;
    }

    const realId = rawId.toUpperCase();
    document.title = `${realId} · REAL`;

    const { data: member, error } = await supabaseClient
      .from('members')
      .select('*')
      .eq('real_id', realId)
      .single();

    if (error || !member) {
      renderNotFound(realId);
      return;
    }

    const { data: platforms } = await supabaseClient
      .from('platform_verifications')
      .select('platform, handle, verified_at')
      .eq('user_id', member.user_id)
      .eq('status', 'verified')
      .order('verified_at', { ascending: true });

    renderProfile(member, platforms);
  }

  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    const resultsDiv = document.getElementById('searchResults');
    resultsDiv.style.display = 'block';
    resultsDiv.innerHTML = '<div class="search-none">Searching...</div>';

    let results = [];

    if (query.toUpperCase().startsWith('RL-')) {
      const { data } = await supabaseClient
        .from('members')
        .select('real_id, display_name, verified_since, membership_tier')
        .eq('real_id', query.toUpperCase())
        .eq('is_active', true);
      results = data || [];
    } else {
      const { data } = await supabaseClient
        .from('members')
        .select('real_id, display_name, verified_since, membership_tier')
        .ilike('display_name', `%${query}%`)
        .eq('is_active', true)
        .limit(10);
      results = data || [];
    }

    if (results.length === 0) {
      resultsDiv.innerHTML = '<div class="search-none">No verified profiles found for that search.</div>';
      return;
    }

    resultsDiv.innerHTML = results.map(r => `
      <a href="/profile/${r.real_id}" class="search-result-item">
        <div class="sri-id">${r.real_id}</div>
        <div class="sri-name">${r.display_name || 'REAL Member'}</div>
        <div class="sri-since">Verified since ${formatDate(r.verified_since)}</div>
      </a>`).join('');
  }

  function focusSearch() {
    document.getElementById('searchInput').focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  loadProfile();
</script>
</body>
</html>
